name: Deploy Web App to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allow manual triggers from the Actions UI

# Allow the workflow to write to the gh-pages branch
permissions:
  contents: write

jobs:
  deploy:
    name: Build & Deploy to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Gradle setup (caching included) ───────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      # ── 4. Make gradlew executable ───────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 5. Build the production Wasm distribution ─────────────────────────────
      - name: Build Wasm production bundle
        run: ./gradlew :webApp:wasmJsBrowserDistribution --no-daemon

      # ── 6. Deploy to gh-pages branch ─────────────────────────────────────────
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./webApp/build/dist/wasmJs/productionExecutable
          publish_branch: gh-pages
          force_orphan: true          # keeps gh-pages history clean
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'Deploy XAPK Installer web app 🚀'
