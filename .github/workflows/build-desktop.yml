name: Build Desktop App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false          # Let all three runners finish even if one fails
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-name: xapk-installer-windows
            artifact-path: desktopApp/build/compose/binaries/main/msi

          - os: macos-latest
            task: packageDmg
            artifact-name: xapk-installer-macos
            artifact-path: desktopApp/build/compose/binaries/main/dmg

          - os: ubuntu-latest
            task: packageDeb
            artifact-name: xapk-installer-linux
            artifact-path: desktopApp/build/compose/binaries/main/deb

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ───────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ── 3. Gradle setup (caching included) ──────────────────────────────────
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper   # honours gradle/wrapper/gradle-wrapper.properties

      # ── 4. Make gradlew executable (needed on macOS/Linux) ──────────────────
      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew

      # ── 5. Package the desktop app ───────────────────────────────────────────
      - name: Package (${{ matrix.task }})
        run: ./gradlew :desktopApp:${{ matrix.task }} --no-daemon

      # ── 6. Upload the installer as a downloadable artifact ──────────────────
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error   # fail loudly if the packaging step produced nothing
          retention-days: 14
