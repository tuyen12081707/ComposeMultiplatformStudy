name: Build and Auto-Release Desktop App

on:
  push:
    # Action này CHỈ chạy khi bạn push một Tag mới bắt đầu bằng chữ "v" (ví dụ: v1.0.4)
    tags:
      - 'v*'
  workflow_dispatch:

# Cấp quyền cho con bot GitHub tạo Release
permissions:
  contents: write

jobs:
  # ── JOB 1: ĐÓNG GÓI 3 NỀN TẢNG SONG SONG (Giữ nguyên luồng cũ của bạn) ──
  build:
    name: Package on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            task: packageMsi
            artifact-name: xapk-installer-windows
            artifact-path: desktopApp/build/compose/binaries/main/msi
          - os: macos-latest
            task: packageDmg
            artifact-name: xapk-installer-macos
            artifact-path: desktopApp/build/compose/binaries/main/dmg
          - os: ubuntu-latest
            task: packageDeb
            artifact-name: xapk-installer-linux
            artifact-path: desktopApp/build/compose/binaries/main/deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper
      - name: Grant execute permission for gradlew
        if: runner.os != 'Windows'
        run: chmod +x gradlew
      - name: Package (${{ matrix.task }})
        run: ./gradlew :desktopApp:${{ matrix.task }} --no-daemon

      # Lưu tạm file lên mây để Job Release bên dưới lấy xuống
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 1

  # ── JOB 2: TỰ ĐỘNG TẠO RELEASE & TẢI FILE LÊN (Tự động hóa hoàn toàn) ──
  release:
    name: Auto Release
    needs: build # Bắt buộc phải đợi Job 'build' xong mới chạy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename files for Static Web Links
        # Đổi tên file cho chuẩn với Link "Bất tử" gắn trên Web
        run: |
          mkdir release_assets
          mv artifacts/xapk-installer-macos/*.dmg release_assets/XAPK-Installer-macOS.dmg
          mv artifacts/xapk-installer-windows/*.msi release_assets/XAPK-Installer-Windows.msi
          mv artifacts/xapk-installer-linux/*.deb release_assets/XAPK-Installer-Ubuntu.deb

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release_assets/*
          generate_release_notes: true # Tự động tạo mô tả cập nhật